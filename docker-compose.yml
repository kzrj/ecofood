services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPYCACHEPREFIX: /cache/pycache
    volumes:
      - ./backend/app:/app/app
      - ./simulation:/app/simulation
      - api_pycache:/cache/pycache
      - /app/.pytest_cache
    ports:
      - "8001:8000"
    depends_on:
      - mongo

  frontend-build:
    image: node:22
    working_dir: /src
    restart: "no"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./front:/src
      - front_node_modules:/src/node_modules
      - front_dist:/out
    command: >
      sh -c "[ -d node_modules/.bin ] || npm install &&
             npm run build &&
             rm -rf /out/* &&
             cp -r /src/dist/. /out/"

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - front_dist:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  mongo_data:
  front_dist:
  front_node_modules:
  api_pycache:
